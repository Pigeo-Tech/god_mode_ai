name: god_mode_ai
description: GOD MODE AI mobile client (Android + iOS).
publish_to: "none"
version: 0.10.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1        # state management
  http: ^1.2.1                    # REST
  web_socket_channel: ^3.0.0      # WebSocket streaming
  flutter_secure_storage: ^9.2.2  # JWT token storage
  shared_preferences: ^2.2.3      # offline cache
  firebase_messaging: ^15.0.0     # push notifications
  url_launcher: ^6.3.0            # open Play Store / YouTube deep links
  speech_to_text: ^7.0.0         # Buddy voice input (mic -> text)
  flutter_tts: ^4.2.0            # Buddy voice output fallback (device TTS)
  audioplayers: ^6.1.0          # play ElevenLabs MP3 voice from the backend
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
