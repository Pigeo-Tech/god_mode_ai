# Render.com blueprint — free public deployment of the AGNI backend.
# Render reads this automatically when you create a "Blueprint" from your repo.
services:
  - type: web
    name: agni-api
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn backend.api.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: USE_IN_MEMORY_BACKENDS   # no database needed on the free tier
        value: "true"
      - key: WAIT_FOR_DEPS
        value: "false"
      - key: APP_ENV
        value: "production"
      - key: JWT_SECRET               # Render generates a strong random value
        generateValue: true
      - key: PYTHON_VERSION
        value: "3.12.4"
