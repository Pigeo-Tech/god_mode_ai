# Production-like stack: NGINX -> API (gunicorn/uvicorn) + Postgres + Redis + Qdrant.
# Usage:  docker compose -f docker/docker-compose.prod.yml --env-file ../.env up -d --build
name: god-mode-ai-prod

services:
  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - api
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: god-mode-ai:prod
    environment:
      APP_ENV: production
      USE_IN_MEMORY_BACKENDS: "false"
      RUN_MIGRATIONS: "true"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
    env_file:
      - ../.env
    expose:
      - "8000"
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      qdrant: { condition: service_started }
    restart: unless-stopped
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: "2.0"
          memory: 2G

  postgres:
    image: postgres:16-alpine
    env_file:
      - ../.env
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-godmode}"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    volumes:
      - qdrantdata:/qdrant/storage
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  qdrantdata:
