# AGNI — single-server budget stack. Runs the whole platform on one small VM.
# API + Postgres + Redis + Qdrant + Caddy (automatic free HTTPS).
# Usage:  cd deployment/budget && cp .env.example .env && docker compose up -d --build
name: agni-budget

services:
  caddy:
    image: caddy:2-alpine
    ports: ["80:80", "443:443"]
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      DOMAIN: ${DOMAIN:-:80}
    depends_on: [api]
    restart: unless-stopped
    mem_limit: 64m

  api:
    build:
      context: ../..
      dockerfile: docker/Dockerfile
    image: agni-api:latest
    env_file: .env
    environment:
      APP_ENV: production
      USE_IN_MEMORY_BACKENDS: "false"
      RUN_MIGRATIONS: "true"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
    expose: ["8000"]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      qdrant: { condition: service_started }
    restart: unless-stopped
    mem_limit: 1g

  postgres:
    image: postgres:16-alpine
    env_file: .env
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    mem_limit: 512m

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "192mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    mem_limit: 256m

  qdrant:
    image: qdrant/qdrant:latest
    volumes:
      - qdrantdata:/qdrant/storage
    restart: unless-stopped
    mem_limit: 768m

volumes:
  pgdata:
  redisdata:
  qdrantdata:
  caddy_data:
  caddy_config:
